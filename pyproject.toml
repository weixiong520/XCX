[tool.ruff]
target-version = "py314"
line-length = 120
exclude = [
    ".git",
    ".codex",
    ".vscode",
    "__pycache__",
    "browser_profile",
    "build",
    "dist",
    "ms-playwright",
    "output",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"desktop_py/core/fetcher.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = false
[tool.mypy]
python_version = "3.14"
files = [
  "desktop_py/core/store.py",
  "desktop_py/core/browser_runtime.py",
  "desktop_py/core/notifier.py",
  "desktop_py/core/models.py",
  "desktop_py/core/parser.py",
  "desktop_py/core/fetcher_support.py",
  "desktop_py/ui/task_runner.py",
  "desktop_py/ui/workers.py",
]
ignore_missing_imports = true
check_untyped_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
warn_return_any = true
warn_unused_ignores = true
disable_error_code = ["import-untyped"]
