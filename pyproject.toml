[tool.ruff]
target-version = "py314"
line-length = 120
exclude = [
    ".git",
    ".codex",
    ".vscode",
    "__pycache__",
    "browser_profile",
    "build",
    "dist",
    "ms-playwright",
    "output",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"desktop_py/core/fetcher.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = false
