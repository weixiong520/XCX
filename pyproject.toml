[tool.ruff]
target-version = "py314"
line-length = 120
exclude = [
    ".git",
    ".codex",
    ".vscode",
    "__pycache__",
    "browser_profile",
    "build",
    "dist",
    "ms-playwright",
    "output",
]

[tool.ruff.lint]
select = ["F", "I"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = false
